<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor Financeiro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0b0f1a;
  color: white;
  margin: 0;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 15px;
}

.card {
  background: #111827;
  padding: 15px;
  border-radius: 16px;
  margin-bottom: 12px;
}

input, select {
  padding: 12px;
  margin: 5px 0;
  width: 100%;
  border-radius: 10px;
  border: none;
  background: #1f2937;
  color: white;
}

button {
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: #22c55e;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.item {
  display: flex;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid #1f2937;
}

.saldo {
  font-size: 28px;
  font-weight: bold;
}

.positivo { color: #22c55e; }
.negativo { color: #ef4444; }
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="logar()">Entrar</button>
  <button onclick="registrar()">Criar conta</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<h1>Gestor Financeiro</h1>
<button onclick="sair()">Sair</button>

<div class="card">
  <h3>Adicionar</h3>
  <input id="desc" placeholder="Descrição">
  <input id="valor" type="number" placeholder="Valor">

  <select id="tipo">
    <option value="entrada">Salário</option>
    <option value="variavel">Variável</option>
    <option value="fixo">Fixo</option>
    <option value="parcelado">Parcelado</option>
  </select>

  <input id="parcelas" type="number" placeholder="Total de parcelas">
  
  <button onclick="adicionar()">Adicionar</button>
</div>

<div class="card">
  <div id="resumo"></div>
</div>

<div class="card">
  <canvas id="grafico"></canvas>
</div>

<div class="card">
  <h3>Transações</h3>
  <div id="lista"></div>
</div>

<div class="card">
  <h3>Histórico</h3>
  <div id="historico"></div>
</div>

<div class="card" id="detalheMes" style="display:none;">
  <h3>Detalhes</h3>
  <div id="detalhes"></div>
</div>

<button onclick="fecharMes()">Fechar Mês</button>

</div>
</div>

<script>

const API = "";
let token = localStorage.getItem("token");
let grafico;

// ===== LOGIN CONTROL =====
if (token) {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("app").style.display = "block";
  render();
} else {
  document.getElementById("loginBox").style.display = "block";
}

// ===== AUTH =====
async function logar() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, senha })
  });

  const data = await res.json();

  if (!data.token) return alert("Erro no login");

  localStorage.setItem("token", data.token);
  location.reload();
}

async function registrar() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  await fetch(API + "/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, senha })
  });

  alert("Conta criada!");
}

function sair() {
  localStorage.removeItem("token");
  location.reload();
}

// ===== API =====
async function gerarMes() {
  const res = await fetch(API + "/mes", {
    headers: { Authorization: token }
  });
  return await res.json();
}

// ===== RENDER =====
async function render() {
  const dados = await gerarMes();

  let entradas = 0;
  let saidas = 0;
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  dados.forEach(d => {

    if (d.tipo === "entrada") entradas += d.valor;
    else saidas += d.valor;

    lista.innerHTML += `
      <div class="item">
        <div>${d.desc}</div>
        <div>
          R$ ${d.valor}
          <button onclick="deletar('${d._id}')">X</button>
        </div>
      </div>
    `;
  });

  const saldo = entradas - saidas;

  document.getElementById("resumo").innerHTML = `
    <div class="saldo ${saldo >= 0 ? "positivo" : "negativo"}">
      R$ ${saldo.toFixed(2)}
    </div>
  `;

  gerarGrafico(dados);
  carregarHistorico();
}

// ===== GRÁFICO =====
function gerarGrafico(dados) {
  const entrada = dados.filter(d => d.tipo === "entrada").reduce((a,b)=>a+b.valor,0);
  const saida = dados.filter(d => d.tipo !== "entrada").reduce((a,b)=>a+b.valor,0);

  if (grafico) grafico.destroy();

  grafico = new Chart(document.getElementById("grafico"), {
    type: "doughnut",
    data: {
      labels: ["Entrada", "Saída"],
      datasets: [{ data: [entrada, saida] }]
    }
  });
}

// ===== CRUD =====
async function adicionar() {
  const desc = document.getElementById("desc").value;
  const valor = Number(document.getElementById("valor").value);
  const tipo = document.getElementById("tipo").value;

  await fetch(API + "/regras", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      descricao: desc,
      tipo,
      valor,
      valorParcela: valor,
      totalParcelas: 1,
      parcelasPagas: 0,
      ativo: true
    })
  });

  render();
}

async function deletar(id) {
  await fetch(API + `/regras/${id}`, {
    method: "DELETE",
    headers: { Authorization: token }
  });
  render();
}

// ===== HISTÓRICO =====
async function carregarHistorico() {
  const res = await fetch(API + "/historico", {
    headers: { Authorization: token }
  });

  const meses = await res.json();

  const div = document.getElementById("historico");
  div.innerHTML = "";

  meses.forEach(m => {
    div.innerHTML += `<div class="item">${m.mes} - R$ ${m.total}</div>`;
  });
}

// ===== FECHAR =====
async function fecharMes() {
  const dados = await gerarMes();

  await fetch(API + "/fechar", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      mes: new Date().toISOString().slice(0,7),
      dados
    })
  });

  alert("Mês fechado!");
  render();
}

</script>
</body>
</html>
